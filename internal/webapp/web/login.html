<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fahriddin AI — Kirish</title>
<link rel="stylesheet" href="/style.css" />
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .login-card {
    width: 100%;
    max-width: 360px;
    background: var(--secondary-bg);
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: var(--card-shadow);
  }
  .login-logo {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: var(--accent-gradient);
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
  }
  .login-title { text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .login-sub { text-align: center; font-size: 13px; color: var(--hint); margin-bottom: 24px; }
  .login-field { margin-bottom: 14px; }
  .login-field label { display: block; font-size: 13px; color: var(--hint); margin-bottom: 6px; }
  .login-field input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid color-mix(in srgb, var(--hint) 30%, transparent);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
  }
  .login-field input:focus {
    outline: none;
    border-color: var(--accent-a);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-a) 20%, transparent);
  }
  .login-submit {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: var(--accent-gradient);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
  }
  .login-submit:active { opacity: 0.85; }
  .login-error {
    font-size: 13px;
    color: var(--danger);
    text-align: center;
    margin-top: 12px;
    min-height: 16px;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">FA</div>
  <div class="login-title">Fahriddin AI</div>
  <div class="login-sub">Platformaga kirish</div>

  <form id="login-form">
    <div class="login-field">
      <label for="username">Login</label>
      <input id="username" name="username" type="text" autocomplete="username" required />
    </div>
    <div class="login-field">
      <label for="password">Parol</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
    </div>
    <button class="login-submit" type="submit">Kirish</button>
    <div class="login-error" id="login-error"></div>
  </form>
</div>

<script>
(function () {
  "use strict";
  var form = document.getElementById("login-form");
  var errorEl = document.getElementById("login-error");

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    errorEl.textContent = "";

    fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
      }),
    }).then(function (res) {
      if (res.ok) {
        window.location.href = "/";
      } else {
        errorEl.textContent = "Login yoki parol noto'g'ri.";
      }
    }).catch(function () {
      errorEl.textContent = "Xatolik yuz berdi. Qayta urinib ko'ring.";
    });
  });
})();
</script>

</body>
</html>
